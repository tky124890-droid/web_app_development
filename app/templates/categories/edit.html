{% extends "base.html" %}

{% block title %}編輯分類 - 個人記帳簿{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h3 class="mb-0"><i class="bi bi-pencil"></i> 編輯分類</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('categories.update', id=category.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">分類名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required
                               value="{{ form.get('name') if form else category.name }}">
                    </div>
                    <div class="mb-3">
                        <label for="type" class="form-label">類型 <span class="text-danger">*</span></label>
                        <select class="form-select" id="type" name="type" required>
                            {% set current_type = form.get('type') if form else category.type %}
                            <option value="expense" {% if current_type == 'expense' %}selected{% endif %}>支出</option>
                            <option value="income" {% if current_type == 'income' %}selected{% endif %}>收入</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-lg"></i> 更新
                        </button>
                        <a href="{{ url_for('categories.index') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i> 取消
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
