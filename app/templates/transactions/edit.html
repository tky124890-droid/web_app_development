{% extends "base.html" %}
{% block title %}編輯收支 - 個人記帳簿{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h3 class="mb-0"><i class="bi bi-pencil"></i> 編輯收支紀錄</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('transactions.update', id=transaction.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="type" class="form-label">收支類型 <span class="text-danger">*</span></label>
                        <select class="form-select" id="type" name="type" required>
                            <option value="income" {% if (form and form.get('type') == 'income') or (not form and transaction.type == 'income') %}selected{% endif %}>收入</option>
                            <option value="expense" {% if (form and form.get('type') == 'expense') or (not form and transaction.type == 'expense') %}selected{% endif %}>支出</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">金額 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text">NT$</span>
                            <input type="number" class="form-control" id="amount" name="amount" step="0.01" min="0.01" required value="{{ form.get('amount') if form else transaction.amount }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label">日期 <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="date" name="date" required value="{{ form.get('date') if form else transaction.date }}">
                    </div>
                    <div class="mb-3">
                        <label for="category_id" class="form-label">分類 <span class="text-danger">*</span></label>
                        <select class="form-select" id="category_id" name="category_id" required>
                            <option value="" disabled>請選擇分類</option>
                            {% set selected_cat = form.get('category_id') if form else transaction.category_id|string %}
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if selected_cat == cat.id|string %}selected{% endif %}>{{ cat.name }}（{{ '收入' if cat.type == 'income' else '支出' }}）</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="account_id" class="form-label">帳戶 <span class="text-danger">*</span></label>
                        <select class="form-select" id="account_id" name="account_id" required>
                            <option value="" disabled>請選擇帳戶</option>
                            {% set selected_acc = form.get('account_id') if form else transaction.account_id|string %}
                            {% for acc in accounts %}
                            <option value="{{ acc.id }}" {% if selected_acc == acc.id|string %}selected{% endif %}>{{ acc.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">說明</label>
                        <input type="text" class="form-control" id="description" name="description" value="{{ form.get('description') if form else transaction.description or '' }}" placeholder="選填">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning"><i class="bi bi-check-lg"></i> 更新</button>
                        <a href="{{ url_for('transactions.index') }}" class="btn btn-outline-secondary"><i class="bi bi-x-lg"></i> 取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
