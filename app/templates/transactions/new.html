{% extends "base.html" %}

{% block title %}新增收支 - 個人記帳簿{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h3 class="mb-0"><i class="bi bi-plus-circle"></i> 新增收支紀錄</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('transactions.create') }}" method="POST">
                    <!-- 收支類型 -->
                    <div class="mb-3">
                        <label for="type" class="form-label">收支類型 <span class="text-danger">*</span></label>
                        <select class="form-select" id="type" name="type" required>
                            <option value="" disabled {% if not (form and form.get('type')) %}selected{% endif %}>請選擇</option>
                            <option value="income" {% if form and form.get('type') == 'income' %}selected{% endif %}>收入</option>
                            <option value="expense" {% if form and form.get('type') == 'expense' %}selected{% endif %}>支出</option>
                        </select>
                    </div>

                    <!-- 金額 -->
                    <div class="mb-3">
                        <label for="amount" class="form-label">金額 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text">NT$</span>
                            <input type="number" class="form-control" id="amount" name="amount"
                                   step="0.01" min="0.01" required
                                   value="{{ form.get('amount', '') if form else '' }}"
                                   placeholder="請輸入金額">
                        </div>
                    </div>

                    <!-- 日期 -->
                    <div class="mb-3">
                        <label for="date" class="form-label">日期 <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="date" name="date" required
                               value="{{ form.get('date', '') if form else '' }}">
                    </div>

                    <!-- 分類 -->
                    <div class="mb-3">
                        <label for="category_id" class="form-label">分類 <span class="text-danger">*</span></label>
                        <select class="form-select" id="category_id" name="category_id" required>
                            <option value="" disabled {% if not (form and form.get('category_id')) %}selected{% endif %}>請選擇分類</option>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}"
                                    {% if form and form.get('category_id') == cat.id|string %}selected{% endif %}>
                                    {{ cat.name }}（{{ '收入' if cat.type == 'income' else '支出' }}）
                                </option>
                            {% endfor %}
                        </select>
                        {% if not categories %}
                            <div class="form-text text-warning">
                                <i class="bi bi-exclamation-triangle"></i> 尚未建立分類，請先<a href="{{ url_for('categories.index') }}">新增分類</a>。
                            </div>
                        {% endif %}
                    </div>

                    <!-- 帳戶 -->
                    <div class="mb-3">
                        <label for="account_id" class="form-label">帳戶 <span class="text-danger">*</span></label>
                        <select class="form-select" id="account_id" name="account_id" required>
                            <option value="" disabled {% if not (form and form.get('account_id')) %}selected{% endif %}>請選擇帳戶</option>
                            {% for acc in accounts %}
                                <option value="{{ acc.id }}"
                                    {% if form and form.get('account_id') == acc.id|string %}selected{% endif %}>
                                    {{ acc.name }}
                                </option>
                            {% endfor %}
                        </select>
                        {% if not accounts %}
                            <div class="form-text text-warning">
                                <i class="bi bi-exclamation-triangle"></i> 尚未建立帳戶，請先<a href="{{ url_for('accounts.index') }}">新增帳戶</a>。
                            </div>
                        {% endif %}
                    </div>

                    <!-- 說明 -->
                    <div class="mb-3">
                        <label for="description" class="form-label">說明</label>
                        <input type="text" class="form-control" id="description" name="description"
                               value="{{ form.get('description', '') if form else '' }}"
                               placeholder="選填，如：午餐、薪水">
                    </div>

                    <!-- 按鈕 -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> 儲存
                        </button>
                        <a href="{{ url_for('transactions.index') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i> 取消
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
